<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CF Worker Chat</title>
    <link rel="stylesheet" href="/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css"
    />
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/highlight.min.js"
    ></script>
  </head>
  <body>
    <a class="skip-link" href="#chatWorkspace">跳到对话区域</a>

    <div class="page-shell">
      <header id="topBar" class="top-bar panel">
        <div class="top-bar-controls">
          <button
            id="sessionSidebarToggle"
            class="ghost-button compact-button mobile-only-button"
            type="button"
            aria-expanded="false"
            aria-controls="sessionSidebar"
          >
            对话记录
          </button>

          <div id="modelPicker" class="model-picker">
            <div
              id="featuredModelList"
              class="featured-model-list"
              aria-label="featured models"
            ></div>
            <button
              id="modelCatalogToggle"
              class="ghost-button compact-button"
              type="button"
              aria-expanded="false"
              aria-controls="modelCatalogPanel"
            >
              更多模型
            </button>
          </div>
        </div>

        <section id="modelCatalogPanel" class="floating-panel model-catalog-panel" hidden>
          <label class="field-label" for="modelSearchInput">搜索模型</label>
          <input
            id="modelSearchInput"
            class="model-search-input"
            type="search"
            placeholder="搜索模型或提供方"
            autocomplete="off"
          />
          <div id="modelCatalogList" class="model-catalog-list"></div>
        </section>

        <div
          id="chatStatus"
          class="visually-hidden"
          data-state="idle"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        >
          准备就绪
        </div>
      </header>

      <main id="chatWorkspace" class="chat-layout">
        <div id="sessionSidebarBackdrop" class="session-sidebar-backdrop" hidden></div>

        <aside id="sessionSidebar" class="session-sidebar panel" data-open="false">
          <div class="session-sidebar-top">
            <button id="newChatButton" class="primary-button" type="button">新对话</button>
          </div>

          <div id="sessionList" class="session-list"></div>

          <div class="session-sidebar-footer">
            <button
              id="clearAllSessionsButton"
              class="ghost-button compact-button danger-button"
              type="button"
            >
              清空全部
            </button>
          </div>
        </aside>

        <section class="chat-column panel">
          <div id="chatHistory" class="chat-history" aria-live="polite"></div>

          <form id="chatForm" class="composer" autocomplete="off">
            <textarea
              id="userInput"
              rows="1"
              placeholder="输入消息"
            ></textarea>
            <div id="composerActions" class="composer-actions">
              <button id="sendButton" class="primary-button" type="submit">发送</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
