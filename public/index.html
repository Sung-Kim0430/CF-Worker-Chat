<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CF Worker Chat</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"
    ></script>
  </head>
  <body>
    <a class="skip-link" href="#chatWorkspace">跳到对话区域</a>

    <div class="page-shell">
      <header id="topBar" class="top-bar panel">
        <div class="top-bar-copy">
          <h1 id="appTitle">CF Worker Chat</h1>
          <p id="appSubtitle" class="hero-copy">整洁、稳定的多模型 AI 对话。</p>
        </div>
        <div class="top-bar-side">
          <div id="workspaceBadges" class="header-badges" aria-label="workspace badges"></div>
        </div>
      </header>

      <main id="chatWorkspace" class="chat-layout">
        <section class="chat-column panel">
          <div class="panel-heading">
            <div>
              <p class="section-label">Chat</p>
              <h2>对话</h2>
            </div>
          </div>

          <section id="sessionSummary" class="session-summary" data-state="idle">
            <div class="session-summary-copy">
              <p class="section-label">Session</p>
              <h3 id="sessionHeadline">准备就绪，可以从一个明确问题开始。</h3>
              <div
                id="chatStatus"
                class="status-strip"
                data-state="idle"
                role="status"
                aria-live="polite"
                aria-atomic="true"
              >
                准备就绪
              </div>
            </div>
            <div id="sessionMeta" class="session-meta"></div>
          </section>

          <div id="chatHistory" class="chat-history" aria-live="polite"></div>

          <form id="chatForm" class="composer" autocomplete="off">
            <div class="composer-top">
              <label class="composer-label" for="userInput">输入消息</label>
            </div>
            <div
              id="composerPresets"
              class="composer-presets"
              aria-label="composer shortcuts"
            ></div>
            <textarea
              id="userInput"
              rows="1"
              placeholder="例如：请帮我把这个需求拆成目标、约束、实现步骤和风险。"
            ></textarea>
            <div id="composerActions" class="composer-actions">
              <div class="composer-hints">
                <p id="inputHint" class="input-hint">
                  Enter 发送，Shift+Enter 换行。
                </p>
              </div>
              <div class="composer-buttons">
                <button id="resetButton" class="ghost-button" type="button">
                  清空会话
                </button>
                <button id="sendButton" class="primary-button" type="submit">
                  <span>发送消息</span>
                  <small>Enter</small>
                </button>
              </div>
            </div>
          </form>
        </section>

        <aside class="side-column">
          <section class="side-card panel model-panel">
            <div class="side-card-heading">
              <div>
                <p class="section-label">Models</p>
                <h3>模型选择</h3>
              </div>
              <button
                id="modelCatalogToggle"
                class="ghost-button compact-button"
                type="button"
                aria-expanded="false"
                aria-controls="modelCatalogPanel"
              >
                全部模型
              </button>
            </div>

            <div id="featuredModelList" class="featured-model-list" aria-label="featured models"></div>
            <p id="modelCatalogPreview" class="model-catalog-preview"></p>

            <section id="modelCatalogPanel" class="model-catalog-panel" hidden>
              <label class="field-label" for="modelSearchInput">搜索模型</label>
              <input
                id="modelSearchInput"
                class="model-search-input"
                type="search"
                placeholder="搜索模型或提供方"
                autocomplete="off"
              />
              <div id="modelCatalogList" class="model-catalog-list"></div>
            </section>

            <div id="modelMeta" class="model-meta-card"></div>
          </section>

          <section class="side-card panel">
            <div class="side-card-heading">
              <div>
                <p class="section-label">Quick Start</p>
                <h3>快捷入口</h3>
              </div>
            </div>
            <div id="starterPrompts" class="prompt-grid"></div>
          </section>

        </aside>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
