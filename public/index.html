<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CF Worker Chat</title>
    <link rel="stylesheet" href="/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css"
    />
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/highlight.min.js"
    ></script>
  </head>
  <body>
    <a class="skip-link" href="#chatWorkspace">跳到对话区域</a>

    <div class="page-shell">
      <header id="topBar" class="top-bar panel">
        <div id="topBarSurface" class="top-bar-surface">
          <div class="top-bar-controls">
            <button
              id="sessionSidebarToggle"
              class="ghost-button compact-button mobile-only-button"
              type="button"
              aria-expanded="false"
              aria-controls="sessionSidebar"
            >
              对话记录
            </button>

            <div id="modelPicker" class="model-picker">
              <div
                id="featuredModelList"
                class="featured-model-list"
                aria-label="featured models"
              ></div>
              <button
                id="modelCatalogToggle"
                class="ghost-button compact-button"
                type="button"
                aria-expanded="false"
                aria-controls="modelCatalogPanel"
              >
                更多模型
              </button>
            </div>
          </div>

          <section id="modelCatalogPanel" class="floating-panel model-catalog-panel" hidden>
            <label class="field-label" for="modelSearchInput">搜索模型</label>
            <input
              id="modelSearchInput"
              class="model-search-input"
              type="search"
              placeholder="搜索模型或提供方"
              autocomplete="off"
            />
            <div id="modelCatalogList" class="model-catalog-list"></div>
          </section>
        </div>

        <div
          id="chatStatus"
          class="visually-hidden"
          data-state="idle"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        >
          准备就绪
        </div>
      </header>

      <main id="chatWorkspace" class="chat-layout">
        <div
          id="sessionSidebarBackdrop"
          class="session-sidebar-backdrop"
          data-open="false"
        ></div>

        <aside id="sessionSidebar" class="session-sidebar panel" data-open="false">
          <div id="sessionSidebarHeader" class="session-sidebar-header">
            <div class="session-sidebar-actions">
              <button
                id="newChatButton"
                class="ghost-button sidebar-new-chat-button"
                type="button"
              >
                新对话
              </button>
              <button
                id="sessionSidebarCloseButton"
                class="ghost-button compact-button mobile-only-button"
                type="button"
              >
                收起
              </button>
            </div>

            <div class="session-search-toolbar">
              <div class="session-search-field">
                <label class="visually-hidden" for="sessionSearchInput">搜索对话</label>
                <input
                  id="sessionSearchInput"
                  class="session-search-input"
                  type="search"
                  placeholder="搜索标题、内容或模型"
                  autocomplete="off"
                  inputmode="search"
                />
                <button
                  id="sessionSearchClearButton"
                  class="ghost-button compact-button session-search-clear-button"
                  type="button"
                  aria-label="清除对话搜索"
                  hidden
                >
                  清除
                </button>
              </div>
              <p id="sessionSearchMeta" class="session-search-meta" aria-live="polite"></p>
            </div>
          </div>

          <div id="sessionSidebarContent" class="session-sidebar-content">
            <div id="sessionList" class="session-list"></div>
          </div>

          <div class="session-sidebar-footer">
            <button
              id="clearAllSessionsButton"
              class="ghost-button compact-button sidebar-secondary-action danger-button"
              type="button"
            >
              清空全部
            </button>
          </div>
        </aside>

        <section id="chatColumnSurface" class="chat-column panel">
          <div id="chatHistory" class="chat-history" aria-live="polite"></div>

          <div id="chatComposerShell" class="chat-composer-shell">
            <form id="chatForm" class="composer" autocomplete="off">
              <textarea
                id="userInput"
                rows="1"
                placeholder="输入消息"
              ></textarea>
              <div id="composerActions" class="composer-actions">
                <button id="sendButton" class="primary-button" type="submit">发送</button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
